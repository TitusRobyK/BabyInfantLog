project_id = "baby-infant-log"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:8888"
additional_redirect_urls = ["http://localhost:8888/**", "http://localhost:5173/**"]
jwt_expiry = 3600
enable_signup = true
minimum_password_length = 12
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

[auth.captcha]
enabled = false
provider = "turnstile"
secret = "env(SUPABASE_AUTH_CAPTCHA_SECRET)"
